version: 2

builds:
  - main: ./cmd/engram
    binary: engram
    ldflags:
      - -s -w -X main.Version={{.Version}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    name_template: "engram_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

brews:
  - repository:
      owner: pythondatascrape
      name: homebrew-tap
    homepage: "https://github.com/pythondatascrape/engram"
    description: "Local-first context compression for AI coding tools"
    license: "Apache-2.0"

changelog:
  sort: asc
  filters:
    exclude:
      - "^chore:"
      - "^docs:"
      - "^test:"
