syntax = "proto3";
package engram.v1;
option go_package = "github.com/pythondatascrape/engram/gen/go/engram/v1";

import "engram/v1/common.proto";
import "engram/v1/session.proto";

// Request (client -> server over QUIC stream)
message Request {
    string session_id = 1;                  // empty on first request -> server creates session
    string query = 2;                       // user query text
    map<string, string> identity = 3;       // raw key-value pairs (first request only)
    SessionOpts opts = 4;                   // provider/model selection (first request only)
    repeated KnowledgeRef knowledge_refs = 5; // knowledge pointers (first request only)
}

// Response (server -> client over QUIC stream)
message Response {
    string session_id = 1;
    oneof payload {
        ResponseChunk chunk = 2;
        ResponseComplete complete = 3;
        ErrorDetail error = 4;
    }
    StateHeader state = 5;  // always present - passive state for free
}

// Streaming token chunk (sent repeatedly as tokens arrive)
message ResponseChunk {
    string text = 1;          // token text
    int32 index = 2;          // chunk sequence number
}

// Final message after all chunks (sent once)
message ResponseComplete {
    string full_text = 1;       // complete response text
    int32 total_chunks = 2;
    int32 total_tokens = 3;     // tokens in this response
    int32 latency_ms = 4;       // time-to-first-token
    int32 duration_ms = 5;      // total response time
}

// State query (client -> server, server -> client)
message StateRequest {
    string session_id = 1;  // optional - omit for server-level state
}

message StateResponse {
    string server_status = 1;
    int32 server_uptime_seconds = 2;
    SessionState session = 3;       // present if session_id was provided
    repeated ProviderState providers = 4;  // providers this client has access to
}

message ProviderState {
    string name = 1;
    string status = 2;           // HEALTHY | DEGRADED | RATE_LIMITED | DOWN
    int32 available_connections = 3;
    int32 avg_latency_ms = 4;
    repeated string models = 5;  // available models
}

// Session close (client -> server)
message CloseSessionRequest {
    string session_id = 1;
}

message CloseSessionResponse {
    SessionState final_state = 1;  // final session stats
}
