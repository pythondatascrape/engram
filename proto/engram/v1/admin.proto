syntax = "proto3";
package engram.v1;
option go_package = "github.com/pythondatascrape/engram/gen/go/engram/v1";


// Plugin management
message RegisterPluginRequest {
    string name = 1;
    string endpoint = 2;      // gRPC endpoint (host:port)
    string type = 3;          // "provider", "serializer", "codebook", "hook", "observability"
    bool tls = 4;
    bool required = 5;
}

message RegisterPluginResponse {
    string name = 1;
    string status = 2;        // "registered", "shadow" (awaiting promotion)
}

message PromotePluginRequest {
    string name = 1;          // promote from shadow to active
}

message DeregisterPluginRequest {
    string name = 1;
}

message PluginInfo {
    string name = 1;
    string type = 2;
    string status = 3;        // "active", "shadow", "draining", "down"
    bool built_in = 4;
    string endpoint = 5;      // empty for built-in
    string version = 6;
    int32 priority = 7;
}

message ListPluginsResponse {
    repeated PluginInfo plugins = 1;
}

message PluginHealthResponse {
    string name = 1;
    string status = 2;
    int32 latency_ms = 3;     // last healthcheck latency
    string last_error = 4;    // empty if healthy
}

// Client management
message ListClientsResponse {
    repeated ClientInfo clients = 1;
}

message ClientInfo {
    string client_id = 1;
    string name = 2;
    repeated string providers = 3;   // registered provider names
    int32 active_sessions = 4;
    string created_at = 5;           // ISO 8601
    string last_active = 6;          // ISO 8601
    bool blocked = 7;
}

message BlockClientRequest {
    string client_id = 1;
    string reason = 2;
}

message UnblockClientRequest {
    string client_id = 1;
}

// Codebook management
message ListCodebooksResponse {
    repeated CodebookInfo codebooks = 1;
}

message CodebookInfo {
    string name = 1;
    int32 version = 2;
    int32 dimensions = 3;
    string source = 4;        // "file", "plugin", "admin_api"
}

message RegisterCodebookRequest {
    string name = 1;
    string yaml_content = 2;  // full codebook YAML
}

// Server status
message ServerStatusResponse {
    string status = 1;
    int32 uptime_seconds = 2;
    int32 active_sessions = 3;
    int32 active_connections = 4;
    int32 goroutine_count = 5;
    int64 memory_usage_bytes = 6;
    int64 memory_ceiling_bytes = 7;
    repeated PluginInfo plugins = 8;
    repeated ProviderPoolStatus pools = 9;
}

message ProviderPoolStatus {
    string pool_key = 1;         // "provider:client_id_hash" (client_id hashed for privacy)
    int32 active_connections = 2;
    int32 available_connections = 3;
    int32 queue_depth = 4;
    string status = 5;
}
