syntax = "proto3";
package engram.v1;
option go_package = "github.com/pythondatascrape/engram/gen/go/engram/v1";


// Push event (server -> client over dedicated QUIC events stream)
message Event {
    string type = 1;          // e.g., "session.expiring", "provider.degraded"
    int64 timestamp_ms = 2;   // Unix milliseconds
    oneof detail {
        SessionEvent session = 3;
        ProviderEvent provider = 4;
        ServerEvent server = 5;
        SecurityEvent security = 6;
    }
}

message SessionEvent {
    string session_id = 1;
    string reason = 2;           // "idle_timeout", "ttl_expired", "memory_pressure", "server_shutdown"
    int32 ttl_remaining_seconds = 3;
}

message ProviderEvent {
    string provider = 1;
    string status = 2;           // new status
    string previous_status = 3;  // previous status
    int32 avg_latency_ms = 4;
    int32 retry_after_ms = 5;    // for rate_limited events
}

message ServerEvent {
    string status = 1;
    int32 countdown_seconds = 2;  // for draining events
    string message = 3;
}

message SecurityEvent {
    string violation_type = 1;    // "injection_detected", "rate_limited"
    string message = 2;           // sanitized description (no raw payload)
}

// Event subscription (client -> server)
message EventSubscription {
    repeated string types = 1;  // event types to subscribe to (empty = all)
}
