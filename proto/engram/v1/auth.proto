syntax = "proto3";
package engram.v1;
option go_package = "github.com/pythondatascrape/engram/gen/go/engram/v1";


// Client registration (one-time, over HTTPS admin API)
message RegisterClientRequest {
    string name = 1;       // human-readable client name
    string contact = 2;    // email or contact info
}

message RegisterClientResponse {
    string client_id = 1;
    string client_secret = 2;
}

// Provider key registration
message RegisterProvidersRequest {
    map<string, string> providers = 1;  // provider_name -> api_key
}

message RegisterProvidersResponse {
    repeated string registered = 1;  // provider names successfully registered
}

// Token exchange
message TokenRequest {
    string client_id = 1;
    string client_secret = 2;
    int32 expiry_seconds = 3;  // requested expiry (server may cap to max)
}

message TokenResponse {
    string token = 1;         // JWT
    int32 expires_in = 2;     // actual expiry in seconds
}

// Secret rotation
message RotateSecretRequest {}

message RotateSecretResponse {
    string client_secret = 1;           // new secret
    string old_secret_expires = 2;      // ISO 8601 timestamp
}

// Provider key rotation
message RotateProviderKeyRequest {
    string provider = 1;     // which provider to rotate
    string api_key = 2;      // new API key
}

message RotateProviderKeyResponse {
    string provider = 1;
    string status = 2;       // "rotated" - old key drains with in-flight connections
}
