syntax = "proto3";
package engram.v1;
option go_package = "github.com/pythondatascrape/engram/gen/go/engram/v1";

// Error returned to client on any failure
message ErrorDetail {
    int32 code = 1;            // numeric error code (see Error Codes spec)
    string category = 2;       // "auth", "session", "identity", "provider", etc.
    string message = 3;        // human-readable description
    bool retryable = 4;        // whether client should retry
    int32 retry_after_ms = 5;  // suggested wait before retry (0 = immediate)
}

// Lightweight state included in every response
message StateHeader {
    string server_status = 1;       // HEALTHY | DEGRADED | OVERLOADED | DRAINING
    int32 session_ttl_seconds = 2;  // seconds until session eviction
    string provider_status = 3;     // HEALTHY | DEGRADED | RATE_LIMITED | DOWN
    int32 provider_latency_ms = 4;  // average time-to-first-token
}

// Knowledge reference pointer
message KnowledgeRef {
    string ref = 1;  // "qdrant://collection/id" format
}
